# Pre-commit hooks for Odysseus.
#   pip install pre-commit && pre-commit install
#   pre-commit run --all-files
# Revs are pinned (supply-chain, ADR-011); bump deliberately with:
#   pre-commit autoupdate
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: check-yaml
      - id: check-merge-conflict

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.15
    hooks:
      - id: ruff-check    # lint (matches CI's `ruff check`)
      - id: ruff-format   # format check

  # Ratchet: no new Python file over the cap; grandfathered god-files (baseline)
  # may shrink but not grow. Same script the maintainer runs manually.
  - repo: local
    hooks:
      - id: check-file-length
        name: check Python file length (ratchet)
        entry: python scripts/check_file_length.py
        language: system
        types: [python]
        pass_filenames: true
