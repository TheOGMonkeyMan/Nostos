name: CI

# Phase 0.1 safety net. The hard gate is pytest on the {ubuntu, macos, windows}
# x {3.11, 3.12} matrix; lint/format/typecheck run non-blocking for now and are
# ratcheted to gates in later tasks (mypy is "gradual" per the standards).
# Rollback: delete this file.

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save macOS/Windows minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: test (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false  # surface every OS result, not just the first failure
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.11', '3.12']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      # Node lets tests/test_compare_js.py and tests/test_reply_recipients_js.py
      # exercise real JS via `node --input-type=module`; without it they skip.
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # DEFERRED(10.6): pin ruff/mypy versions + action digests (supply-chain task).
          pip install ruff mypy

      - name: Ruff lint (non-blocking)
        continue-on-error: true
        run: ruff check .

      - name: Ruff format check (non-blocking)
        continue-on-error: true
        run: ruff format --check .

      - name: Mypy (gradual, non-blocking)
        continue-on-error: true
        run: mypy app.py src core services routes mcp_servers

      - name: Pytest (gate)
        run: pytest -q
