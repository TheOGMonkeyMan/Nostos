name: CI

# Phase 0.1 safety net. The hard gate is pytest on the {ubuntu, macos, windows}
# x {3.11, 3.12} matrix; lint/format/typecheck run non-blocking for now and are
# ratcheted to gates in later tasks (mypy is "gradual" per the standards).
# Rollback: delete this file.

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save macOS/Windows minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: test (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false  # surface every OS result, not just the first failure
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.11', '3.12']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      # Node lets tests/test_compare_js.py and tests/test_reply_recipients_js.py
      # exercise real JS via `node --input-type=module`; without it they skip.
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # DEFERRED(10.6): pin ruff/mypy versions + action digests (supply-chain task).
          pip install ruff mypy pytest-cov

      # bubblewrap powers the Linux sandbox isolation tests (tests/test_sandbox.py).
      # Without it those tests SKIP; installing it makes the ubuntu lane actually
      # exercise the escape/network/timeout guarantees. (iproute2 is preinstalled.)
      - name: Install bubblewrap (Linux sandbox tests)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y bubblewrap

      - name: Ruff lint (non-blocking)
        continue-on-error: true
        run: ruff check .

      - name: Ruff format check (non-blocking)
        continue-on-error: true
        run: ruff format --check .

      - name: Mypy (gradual, non-blocking)
        continue-on-error: true
        run: mypy app.py src core services routes mcp_servers

      # Gate: tests must pass. Coverage is collected here but NON-gating (no
      # --cov-fail-under), establishing a baseline to ratchet later (0.6 / §12).
      # Baseline at adoption: ~11% over src/core/services/routes/mcp_servers.
      - name: Pytest (gate) + coverage
        run: >-
          pytest -q
          --cov=src --cov=core --cov=services --cov=routes --cov=mcp_servers
          --cov-report=xml --cov-report=term

      - name: Upload coverage artifact
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: warn
