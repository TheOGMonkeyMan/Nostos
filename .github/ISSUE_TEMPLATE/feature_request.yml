name: Feature request
description: Suggest an improvement or new capability.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Odysseus has a deliberately tight scope (a dependable, secure, local-first
        AI workspace). Proposals that add moving parts, new top-level services, or
        cloud dependencies are a hard sell - explain the value against that bar.
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: The user need, not the solution. What can't you do today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What you'd like to see. Sketch the smallest version that helps.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds you've tried or other approaches you weighed.
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: This keeps Odysseus local-first (no required cloud service).
        - label: This does not add a new top-level service to the compose stack.
